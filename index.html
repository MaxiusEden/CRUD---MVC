<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRUD de Tarefas</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h1>CRUD de Tarefas</h1>
  <hr>

  <h2>Cadastro de tarefa</h2>
  <form id="task-form">
    <label for="descricao">Descrição:</label>
    <textarea id="descricao" name="descricao" rows="4" placeholder="O que precisa ser feito?" required></textarea>
    <button type="submit" id="submit-button">Adicionar tarefa</button>
    <button type="button" id="clear-button">Limpar formulário</button>
  </form>
  <hr>

  <h2>Lista de tarefas</h2>
  <p id="task-count">0 tarefas</p>
  <table>
    <thead>
      <tr>
        <th>Descrição</th>
        <th>Concluída</th>
        <th>Ações</th>
      </tr>
    </thead>
    <tbody id="task-list"></tbody>
  </table>

  <script type="module" src="./main.mjs"></script>
</body>
</html>
